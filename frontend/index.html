<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#fdfbf7" />
    <title>pastel -- draw, guess, laugh</title>
    <meta name="description" content="Real-time multiplayer drawing and guessing. Play with friends and bots, no signups, no fuss." />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <meta property="og:title" content="pastel -- draw, guess, laugh" />
    <meta property="og:description" content="Real-time multiplayer drawing and guessing. Play with friends and bots, no signups, no fuss." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://playpastel.com" />
    <meta property="og:image" content="https://playpastel.com/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="pastel - draw, guess, laugh" />
    <meta property="og:site_name" content="pastel" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="pastel -- draw, guess, laugh" />
    <meta name="twitter:description" content="Real-time multiplayer drawing and guessing. Play with friends and bots, no signups, no fuss." />
    <meta name="twitter:image" content="https://playpastel.com/og.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Patrick+Hand&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" />
    <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css" />
    <link rel="stylesheet" href="./src/style.css" />
  </head>
  <body>
    <main>
      <header>
        <h1 class="logo"><span class="logo-text">pastel</span></h1>
        <div id="status" class="status">finding the room...</div>
      </header>
      <div class="workspace">
        <aside class="sidebar sidebar--left">
          <div id="players" class="players"></div>
        </aside>
        <section class="stage">
          <div id="toolbar"></div>
          <div id="banner" class="banner banner--hidden"></div>
          <div class="canvas-wrap">
            <canvas id="canvas"></canvas>
            <div id="gameOverlay"></div>
            <div class="canvas-settings" id="canvasSettings">
              <span class="canvas-settings-grip" id="canvasSettingsGrip"
                    aria-label="Drag to move controls" title="Drag to move">
                <i class="ph ph-dots-six-vertical" aria-hidden="true"></i>
              </span>
              <button id="micToggle" class="canvas-setting" type="button"
                      aria-label="Toggle microphone" title="Voice chat">
                <i class="ph ph-microphone-slash" aria-hidden="true"></i>
              </button>
              <button id="bgToggle" class="canvas-setting" type="button"
                      aria-label="Toggle background music" title="Background music">
                <i class="ph ph-music-notes" aria-hidden="true"></i>
              </button>
              <button id="sfxToggle" class="canvas-setting" type="button"
                      aria-label="Toggle sound effects" title="Sound effects">
                <i class="ph ph-speaker-high" aria-hidden="true"></i>
              </button>
            </div>
          </div>
        </section>
        <aside class="sidebar sidebar--right">
          <div id="chat"></div>
        </aside>
      </div>
    </main>
    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
